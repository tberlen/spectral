<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ office.name }} - Who's Here - Spectral</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon-s.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">Spectral</a>
        <div class="nav-offices">
            {% for o in offices %}
            <a href="/office/{{ o.id }}" class="nav-link">{{ o.name }}</a>
            {% endfor %}
        </div>
    </nav>

    <div class="office-header">
        <h1>{{ office.name }}</h1>
        <div style="display:flex; gap:0.5rem; margin-left:0.5rem;">
            <a href="/office/{{ office.id }}" class="btn btn-sm btn-secondary">Map</a>
            <a href="/people/{{ office.id }}" class="btn btn-sm" style="pointer-events:none;">Who's Here</a>
        </div>
        <div class="office-status" id="people-count">--</div>
    </div>

    <!-- Search -->
    <div style="padding:0 1.5rem 1rem;">
        <input type="text" id="search-input" placeholder="Search by name, hostname, or MAC..."
               style="width:100%; max-width:400px; padding:0.5rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.9rem;">
        <div id="search-results" style="margin-top:0.5rem;"></div>
    </div>

    <!-- First In Today -->
    <div style="padding:0 1.5rem 1rem;">
        <h2 style="font-size:1.1rem; margin-bottom:0.5rem; cursor:pointer;" onclick="toggleSection('first-in-list')">
            First In Today <span style="font-size:0.8rem; color:var(--text-dim);">({{ office.timezone or 'America/New_York' }}) &#9660;</span>
        </h2>
        <div id="first-in-list"></div>
    </div>

    <!-- All Connected -->
    <div style="padding:0 1.5rem 1rem;">
        <h2 style="font-size:1.1rem; margin-bottom:0.5rem;">
            Connected Now <span id="connected-count" style="font-size:0.8rem; color:var(--text-dim);">--</span>
        </h2>
        <div id="client-list"></div>
    </div>

    <!-- Static Devices -->
    <div style="padding:0 1.5rem 1.5rem;">
        <h2 style="font-size:1.1rem; margin-bottom:0.5rem; color:var(--text-dim);">
            Static Devices <span id="static-count" style="font-size:0.8rem;">--</span>
        </h2>
        <div id="static-list"></div>
    </div>

    <script>
        const OFFICE_ID = {{ office.id }};
        const OFFICE_TIMEZONE = '{{ office.timezone or "America/New_York" }}';
    </script>
    <script src="/static/people.js"></script>
</body>
</html>
