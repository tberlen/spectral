services:
  spectral-db:
    image: timescale/timescaledb:latest-pg16
    container_name: spectral-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spectral
      POSTGRES_USER: spectral
      POSTGRES_PASSWORD: REDACTED_DB_PASS
    ports:
      - "5433:5432"
    volumes:
      - spectral_db_data:/var/lib/postgresql/data
      - ../collector/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  spectral-collector:
    build: ../collector
    container_name: spectral-collector
    restart: unless-stopped
    depends_on:
      - spectral-db
    environment:
      DATABASE_URL: postgresql://spectral:REDACTED_DB_PASS@spectral-db:5432/spectral
      UDP_PORT: "8766"
    ports:
      - "8766:8766/udp"
      - "8767:8767"

  spectral-manager:
    build: ../ap-manager
    container_name: spectral-manager
    restart: unless-stopped
    depends_on:
      - spectral-db
    environment:
      DATABASE_URL: postgresql://spectral:REDACTED_DB_PASS@spectral-db:5432/spectral
      SERVER_IP: "REDACTED_SERVER_IP"
      COLLECTOR_PORT: "8766"
      HEALTH_CHECK_INTERVAL: "60"
    volumes:
      - ../spectral:/opt/spectral:ro

  spectral-dashboard:
    build: ../dashboard
    container_name: spectral-dashboard
    restart: unless-stopped
    depends_on:
      - spectral-db
      - spectral-collector
      - spectral-manager
    environment:
      DATABASE_URL: postgresql://spectral:REDACTED_DB_PASS@spectral-db:5432/spectral
      SERVER_IP: "REDACTED_SERVER_IP"
      AP_MANAGER_URL: "http://spectral-manager:8081"
      COLLECTOR_URL: "http://spectral-collector:8767"
    ports:
      - "8080:8080"

volumes:
  spectral_db_data:
